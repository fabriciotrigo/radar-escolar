services:
  api:
    build: ./backend
    image: radar-escolar
    container_name: backend-radar
    ports:
      - "${PORT}:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend-radar
    ports:
      - "8001:8001"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - radar-escolar_data:/var/lib/postgresql/data
      - ./backend/docker:/docker-entrypoint-initdb.d

volumes:
  radar-escolar_data: